version: "3.9"

services:
  app:
    build: .
    image: smart-apply-agent:latest
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-docker}
    restart: unless-stopped
